<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .container {
            background-color: red;
            height: 250px;
            width: 250px;
            background-image: url(../images/image_01.jpg);
            background-size: 150PX;
            background-repeat: no-repeat;
            background-position: center;
            margin: 50px 0px;
            border: 2px solid black;
            padding: 100px;
            border-radius: 50%;
        }
        .container1 {
            background-color: blue;
            height: 150px;
            width: 150px;
            border: 2px solid black;
            padding: 10px;
            border-top-right-radius: 50px
        }

    </style>
</head>
<body>
    <div class="container">this is a background image </div>
    <div class="container1">this is a regular div </div>
</body>
</html>
