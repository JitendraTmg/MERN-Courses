<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        p {
            color: white;
            
        }
        /* selector
        format:
        selector_name{
            attributes: value;
        } */
        .heading-2{
            color: green;
        }
        #heading-3{
            color: orange;
        }
        .test p{
            color: purple;
        }
        #p-test p{
            color: pink;
            background-color: black;
        }
    </style>
</head>
<body>
    <h1 style="background-color: blueviolet;">CSS Example</h1>
    <p>This is a paragraph with some text.</p><br>
    <span>This is a span element.</span>
    <h2 class="heading-2">This is a heading.</h2>
    <h3 id="heading-3">This is a subheading.</h3>
    <div class="test">
        <div id="p-test">
            <p>This is a nested paragraph inside a div.</p>
        </div>
        <div>
            <p>This is a nested paragraph inside a div.</p>
        </div>
    </div>
</body>
</html>
